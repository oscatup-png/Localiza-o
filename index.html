<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root{
    --bg:#0D1117; --panel:#151B23; --panel2:#1C242E; --line:#29323D;
    --text:#E6EDF3; --muted:#8B98A8;
    --hivis:#FF7A1A; --route:#2E6BFF; --lastmile:#4FC3F7; --you:#00E0A4; --danger:#FF5C5C;
    --mono:ui-monospace,"SF Mono","Cascadia Mono",Menlo,Consolas,monospace;
    --ui:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:var(--ui);overflow:hidden}
  #map{position:absolute;inset:0;background:var(--bg)}
  .leaflet-container{background:var(--bg);font-family:var(--ui)}

  /* ---- top search ---- */
  #top{position:absolute;top:0;left:0;right:0;z-index:1000;padding:10px;pointer-events:none}
  #searchWrap{pointer-events:auto;max-width:560px;margin:0 auto;background:var(--panel);
    border:1px solid var(--line);border-radius:14px;box-shadow:0 8px 30px rgba(0,0,0,.45)}
  #searchRow{display:flex;align-items:center;gap:8px;padding:10px 12px}
  #searchRow svg{flex:0 0 auto;opacity:.7}
  #q{flex:1;background:transparent;border:0;outline:0;color:var(--text);font-size:16px;
    font-family:var(--mono);letter-spacing:.3px}
  #q::placeholder{color:var(--muted);font-family:var(--ui);letter-spacing:0}
  #count{font-size:11px;color:var(--muted);white-space:nowrap;font-family:var(--mono)}
  #results{max-height:46vh;overflow:auto;border-top:1px solid var(--line);display:none}
  #results.show{display:block}
  .res{display:flex;justify-content:space-between;gap:10px;padding:11px 14px;cursor:pointer;
    border-bottom:1px solid rgba(41,50,61,.5)}
  .res:last-child{border-bottom:0}
  .res:hover,.res.active{background:var(--panel2)}
  .res .nm{font-family:var(--mono);font-weight:600;color:var(--text)}
  .res .co{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .res .di{font-family:var(--mono);font-size:11px;color:var(--hivis);white-space:nowrap}

  /* ---- FABs ---- */
  .fab{position:absolute;z-index:900;width:52px;height:52px;border-radius:50%;
    background:var(--panel);border:1px solid var(--line);color:var(--text);
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    box-shadow:0 6px 20px rgba(0,0,0,.5)}
  .fab:active{transform:scale(.94)}
  #locBtn{right:14px;bottom:calc(14px + var(--sheetH,0px))}
  #locBtn.on{color:var(--you);border-color:var(--you)}
  #locBtn.loading svg{animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ---- bottom sheet ---- */
  #sheet{position:absolute;left:0;right:0;bottom:0;z-index:950;transform:translateY(110%);
    transition:transform .22s ease;pointer-events:none}
  #sheet.show{transform:translateY(0)}
  #sheetInner{pointer-events:auto;max-width:620px;margin:0 auto;background:var(--panel);
    border:1px solid var(--line);border-bottom:0;border-radius:18px 18px 0 0;
    box-shadow:0 -10px 40px rgba(0,0,0,.5);padding:14px 16px calc(16px + env(safe-area-inset-bottom))}
  #grab{width:38px;height:4px;border-radius:2px;background:var(--line);margin:0 auto 12px}
  #shHead{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
  #shName{font-family:var(--mono);font-size:22px;font-weight:700;letter-spacing:.5px}
  #shCoord{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:3px}
  #closeSheet{background:transparent;border:0;color:var(--muted);font-size:22px;cursor:pointer;line-height:1;padding:2px 6px}
  #routeInfo{display:none;margin-top:12px;padding:10px 12px;background:var(--panel2);
    border:1px solid var(--line);border-radius:12px;font-size:13px;line-height:1.5}
  #routeInfo.show{display:block}
  #routeInfo .big{font-family:var(--mono);font-size:15px;font-weight:700}
  .leg{display:flex;align-items:center;gap:8px;margin-top:4px}
  .swatch{width:22px;height:0;border-top-width:3px;border-top-style:solid;flex:0 0 auto}
  .sw-road{border-color:var(--route)}
  .sw-last{border-color:var(--lastmile);border-top-style:dashed}
  #btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
  .btn{border:1px solid var(--line);background:var(--panel2);color:var(--text);
    padding:12px 10px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:7px;text-decoration:none}
  .btn:active{transform:scale(.97)}
  .btn.primary{background:var(--hivis);border-color:var(--hivis);color:#1a0d00}
  .btn.wide{grid-column:1 / -1}
  .btn.on{border-color:var(--lastmile);color:var(--lastmile)}
  .btn svg{flex:0 0 auto}

  /* ---- trace toolbar ---- */
  #traceBar{position:absolute;left:0;right:0;z-index:960;bottom:calc(16px + var(--sheetH,0px));
    display:none;justify-content:center;gap:8px;pointer-events:none}
  #traceBar.show{display:flex}
  #traceBar .chip{pointer-events:auto;background:var(--panel);border:1px solid var(--line);
    color:var(--text);border-radius:999px;padding:9px 14px;font-size:13px;cursor:pointer;
    box-shadow:0 6px 20px rgba(0,0,0,.5)}
  #traceBar .chip.hint{color:var(--lastmile);border-color:var(--lastmile);cursor:default}

  /* toast */
  #toast{position:absolute;left:50%;bottom:90px;transform:translateX(-50%);z-index:1200;
    background:#000;color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;
    border:1px solid var(--line);opacity:0;transition:opacity .2s;pointer-events:none;max-width:90%}
  #toast.show{opacity:.95}

  .well-label{background:rgba(13,17,23,.85);border:1px solid var(--hivis);color:var(--hivis);
    font-family:var(--mono);font-size:12px;font-weight:700;padding:2px 6px;border-radius:6px;
    white-space:nowrap}
  .leaflet-tooltip.well-label:before{display:none}
</style>
</head>

    const w=WELLS[i];
    const m=L.circleMarker([w[2],w[1]],{renderer:canvas,radius:z>=15?5:4,
      color:'#0D1117',weight:1.2,fillColor:'#FF7A1A',fillOpacity:.95});
    m.on('click',()=>selectWell(i));
    if(showNames) m.bindTooltip(w[0],{className:'well-label',permanent:true,direction:'top',offset:[0,-6]});
    visLayer.addLayer(m);
  }
}
map.on('moveend zoomend', renderVisible);

/* ---- busca ---- */
const q=$("#q"), results=$("#results"), countEl=$("#count");
countEl.textContent = WELLS.length.toLocaleString('pt-BR')+" poços";
let curResults=[];
function search(term){
  term=term.trim().toUpperCase();
  results.classList.remove("show"); results.innerHTML="";
  if(!term){return;}
  const starts=[], contains=[];
  for(let i=0;i<WELLS.length;i++){
    const nm=WELLS[i][0].toUpperCase();
    if(nm.startsWith(term)) starts.push(i);
    else if(nm.includes(term)) contains.push(i);
    if(starts.length>=40) break;
  }
  curResults=starts.concat(contains).slice(0,40);
  if(!curResults.length){
    results.innerHTML=`<div class="res"><span class="co">Nenhum poço encontrado para "${term}"</span></div>`;
    results.classList.add("show"); return;
  }
  results.innerHTML=curResults.map((i,k)=>{
    const w=WELLS[i]; let di="";
    if(userLoc) di=`<span class="di">${fmtDist(haversine(userLoc,[w[2],w[1]]))}</span>`;
    return `<div class="res" data-k="${k}">
      <span><span class="nm">${w[0]}</span></span>
      ${di}
      <span class="co">${w[2].toFixed(5)}, ${w[1].toFixed(5)}</span></div>`;
  }).join("");
  results.classList.add("show");
  results.querySelectorAll(".res").forEach(el=>{
    el.addEventListener("click",()=>{const k=+el.dataset.k;selectWell(curResults[k]);});
  });
}
q.addEventListener("input",e=>search(e.target.value));
q.addEventListener("focus",()=>{if(q.value)search(q.value);});
document.addEventListener("click",e=>{if(!$("#searchWrap").contains(e.target))results.classList.remove("show");});

/* ---- seleção de poço ---- */
let selected=null, selMarker=null;
function selectWell(idx){
  const w=WELLS[idx];
  selected={idx,name:w[0],lon:w[1],lat:w[2]};
  results.classList.remove("show"); q.blur();
  clearRoute(); if(traceMode) exitTrace();
  if(selMarker) map.removeLayer(selMarker);
  selMarker=L.marker([w[2],w[1]],{zIndexOffset:1000}).addTo(map)
    .bindTooltip(w[0],{className:'well-label',permanent:true,direction:'top',offset:[0,-30]});
  map.flyTo([w[2],w[1]], Math.max(map.getZoom(),16), {duration:.6});
  $("#shName").textContent=w[0];
  $("#shCoord").textContent=fmtCoord(w[2],w[1]);
  $("#gmaps").href=`https://www.google.com/maps/dir/?api=1&destination=${w[2]},${w[1]}&travelmode=driving`;
  $("#waze").href=`https://waze.com/ul?ll=${w[2]},${w[1]}&navigate=yes`;
  $("#routeInfo").classList.remove("show");
  openSheet();
  renderVisible();
}

/* ---- bottom sheet ---- */
function openSheet(){$("#sheet").classList.add("show");
  requestAnimationFrame(()=>{const h=$("#sheetInner").offsetHeight;document.documentElement.style.setProperty("--sheetH",h+"px");});}
function closeSheet(){$("#sheet").classList.remove("show");document.documentElement.style.setProperty("--sheetH","0px");
  if(traceMode)exitTrace();}
$("#closeSheet").addEventListener("click",closeSheet);

/* ---- localização ---- */
let userLoc=null, userMarker=null, watchId=null;
function setUser(lat,lon,acc){
  userLoc=[lat,lon];
  if(!userMarker){
    userMarker=L.circleMarker([lat,lon],{radius:7,color:'#0D1117',weight:2,
      fillColor:'#00E0A4',fillOpacity:1}).addTo(map);
  } else userMarker.setLatLng([lat,lon]);
  $("#locBtn").classList.add("on"); $("#locBtn").classList.remove("loading");
}
let pickLocMode=false;
function enablePickLoc(msg){
  pickLocMode=true; if(traceMode)exitTrace();
  map.getContainer().style.cursor='crosshair';
  $("#locBtn").classList.remove("loading");
  toast(msg,6000);
}
$("#locBtn").addEventListener("click",()=>{
  // Chrome bloqueia GPS em file:// (contexto inseguro) — cai direto no modo manual
  if(!window.isSecureContext){
    enablePickLoc("GPS fica bloqueado ao abrir o arquivo como file://. Toque no mapa para marcar sua posição — ou use os botões Google Maps/Waze.");
    return;
  }
  if(!navigator.geolocation){
    enablePickLoc("Sem GPS neste navegador. Toque no mapa para marcar sua posição de partida.");return;}
  $("#locBtn").classList.add("loading");
  navigator.geolocation.getCurrentPosition(
    p=>{setUser(p.coords.latitude,p.coords.longitude,p.coords.accuracy);
        map.flyTo(userLoc,Math.max(map.getZoom(),15),{duration:.6});
        if(watchId==null)watchId=navigator.geolocation.watchPosition(
          w=>setUser(w.coords.latitude,w.coords.longitude,w.coords.accuracy),()=>{},
          {enableHighAccuracy:true,maximumAge:5000});},
    err=>{ if(err.code===1)
        enablePickLoc("Permissão de localização negada pelo navegador. Toque no mapa para marcar sua posição — ou use Google Maps/Waze.");
      else
        enablePickLoc("Não consegui o GPS agora. Toque no mapa para marcar sua posição — ou use Google Maps/Waze."); },
    {enableHighAccuracy:true,timeout:12000,maximumAge:0});
});

/* ---- rota (OSRM) + trecho final tracejado ---- */
let roadLine=null,lastLine=null,routeEnd=null;
function clearRoute(){[roadLine,lastLine].forEach(l=>l&&map.removeLayer(l));
  roadLine=lastLine=routeEnd=null;$("#routeInfo").classList.remove("show");}
$("#routeBtn").addEventListener("click",async()=>{
  if(!selected)return;
  if(!userLoc){toast("Toque no botão de localização (canto inferior direito) primeiro.");
    $("#locBtn").click();return;}
  const dest=[selected.lat,selected.lon];
  $("#routeBtn").textContent="Calculando…";
  try{
    const url=`https://router.project-osrm.org/route/v1/driving/`+
      `${userLoc[1]},${userLoc[0]};${dest[1]},${dest[0]}`+
      `?overview=full&geometries=geojson`;
    const r=await fetch(url); const j=await r.json();
    if(j.code!=="Ok"||!j.routes.length) throw new Error("sem rota");
    clearRoute();
    const route=j.routes[0];
    const coords=route.geometry.coordinates.map(c=>[c[1],c[0]]);
    roadLine=L.polyline(coords,{color:'#2E6BFF',weight:5,opacity:.95}).addTo(map);
    // ponto onde a estrada "termina" (destino encaixado na malha viária)
    const snapped=j.waypoints[1].location; routeEnd=[snapped[1],snapped[0]];
    const lastGap=haversine(routeEnd,dest);
    if(lastGap>25){
      lastLine=L.polyline([routeEnd,dest],{color:'#4FC3F7',weight:4,opacity:.95,dashArray:'2 9'}).addTo(map);
    }
    const info=$("#routeInfo");
    info.innerHTML=`
      <div class="big">${fmtDist(route.distance+lastGap)} · ~${fmtDur(route.duration)}</div>
      <div class="leg"><span class="swatch sw-road"></span> Estrada (roteável): ${fmtDist(route.distance)}</div>`+
      (lastGap>25?`<div class="leg"><span class="swatch sw-last"></span> Acesso final até o poço: ${fmtDist(lastGap)} — siga a trilha visível no satélite</div>`:``)+
      (lastGap>25?`<div style="margin-top:6px;color:var(--muted);font-size:12px">Toque em “Traçar acesso final” para desenhar o caminho exato pela trilha.</div>`:``);
    info.classList.add("show");
    const grp=L.featureGroup([roadLine,lastLine].filter(Boolean));
    map.fitBounds(grp.getBounds().pad(.25));
  }catch(e){
    toast("Roteamento online indisponível agora. Use Google Maps/Waze para navegação por voz.");
  }finally{$("#routeBtn").innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg> Traçar rota até aqui';}
});

/* ---- traçar acesso final manualmente sobre o satélite ---- */
let traceMode=false, tracePts=[], traceLine=null, traceVerts=[];
function startTrace(){
  if(!selected)return;
  traceMode=true; tracePts=[]; clearTraceLayers();
  $("#traceBtn").classList.add("on");
  $("#traceBar").classList.add("show");
  map.getContainer().style.cursor='crosshair';
  toast("Toque no mapa seguindo a trilha até o poço.");
  drawTrace();
}
function exitTrace(){
  traceMode=false;$("#traceBtn").classList.remove("on");$("#traceBar").classList.remove("show");
  map.getContainer().style.cursor='';
}
function clearTraceLayers(){if(traceLine)map.removeLayer(traceLine);traceVerts.forEach(v=>map.removeLayer(v));traceVerts=[];traceLine=null;}
function traceAnchorStart(){return routeEnd || userLoc || [selected.lat,selected.lon];}
function drawTrace(){
  clearTraceLayers();
  const pts=[traceAnchorStart(),...tracePts,[selected.lat,selected.lon]];
  traceLine=L.polyline(pts,{color:'#4FC3F7',weight:4,opacity:.95,dashArray:'2 9'}).addTo(map);
  tracePts.forEach(p=>traceVerts.push(
    L.circleMarker(p,{radius:4,color:'#0D1117',weight:1.5,fillColor:'#4FC3F7',fillOpacity:1}).addTo(map)));
  let d=0;for(let i=1;i<pts.length;i++)d+=haversine(pts[i-1],pts[i]);
  $("#traceHint").textContent=`Acesso: ${fmtDist(d)} · ${tracePts.length} pontos`;
}
$("#traceBtn").addEventListener("click",()=>{traceMode?exitTrace():startTrace();});
$("#traceUndo").addEventListener("click",()=>{tracePts.pop();drawTrace();});
$("#traceDone").addEventListener("click",()=>{exitTrace();toast("Acesso traçado salvo na tela.");});
map.on('click',e=>{
  if(traceMode){tracePts.push([e.latlng.lat,e.latlng.lng]);drawTrace();return;}
  if(pickLocMode){
    setUser(e.latlng.lat,e.latlng.lng);
    pickLocMode=false; map.getContainer().style.cursor='';
    toast("Posição de partida marcada. Toque em “Traçar rota até aqui”.");
  }
});

/* ---- start ---- */
renderVisible();
</script>
</body>
</html>
